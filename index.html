<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Revive Hospital HIS v2.0</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<section id="loginPage" class="login-page">
  <div class="login-card">
    <h1>Revive Hospital</h1>
    <p>Hospital Information System v2.0</p>
    <form id="loginForm">
      <label>Username</label>
      <input id="username" required>
      <label>Password</label>
      <input id="password" type="password" required>
      <button>Login</button>
      <div id="loginError" class="error"></div>
    </form>
  </div>
</section>
<section id="appShell" class="app-shell hidden">
  <aside class="sidebar">
    <h2>Revive HIS</h2>
    <div id="roleBadge" class="role-badge"></div>
    <nav id="mainNav"></nav>
  </aside>
  <main class="main">
    <header class="topbar">
      <div><h1 id="pageTitle">Dashboard</h1><p id="pageSubtitle"></p></div>
      <button id="logoutBtn" class="secondary">Logout</button>
    </header>
    <section id="dashboardView" class="view"></section>
    <section id="patientSearchView" class="view hidden"></section>
    <section id="cashReportView" class="view hidden"></section>
    <section id="cashBookView" class="view hidden"></section>
    <section id="reportsView" class="view hidden"></section>
    <section id="opdView" class="view hidden"></section>
    <section id="ipdView" class="view hidden"></section>
    <section id="ipdChargesView" class="view hidden"></section>
    <section id="ipdBillingView" class="view hidden"></section>
    <section id="doctorMasterView" class="view hidden"></section>
    <section id="pharmacyStockView" class="view hidden"></section>
    <section id="purchaseRegisterView" class="view hidden"></section>
    <section id="supplierMasterView" class="view hidden"></section>
    <section id="medicineMasterView" class="view hidden"></section>
    <section id="pharmacyBillingView" class="view hidden"></section>
    <section id="expensesView" class="view hidden"></section>
  </main>
</section>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="utils.js"></script>
<script src="finance-utils.js"></script>
<script src="print-utils.js"></script>
<script src="dashboard.js"></script>
<script src="patient-search.js"></script>
<script src="cash-report.js"></script>
<script src="pharmacy-stock.js"></script>
<script src="purchase-register.js"></script>
<script src="purchase-register-schema-fix.js"></script>
<script src="masters.js"></script>
<script src="app.js"></script>
<script src="accountant-nav-fix.js"></script>
</body>
</html>
